<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Health Mart</title>
    <style>
        /* Reset some styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f9f9f9;
            color: #333;
        }

        header {
            background-color: #047bfb;
            padding: 20px 0;
            text-align: center;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(4, 123, 251, 0.5);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .gallery {
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid #ddd;
        }

        .gallery img {
            height: 280px;
            width: auto;
            margin-right: 10px;
            border-radius: 0 0 12px 12px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        .info {
            padding: 30px 40px;
        }

        .info h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #047bfb;
        }

        .details {
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 15px 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .details svg {
            fill: #047bfb;
        }

        .details a {
            color: #047bfb;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .details a:hover {
            text-decoration: underline;
            color: #0356b2;
        }

        .open-24 {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 3px 7px rgba(40, 167, 69, 0.5);
            margin-bottom: 30px;
        }

        footer {
            margin-top: 60px;
            padding: 20px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #777;
            border-top: 1px solid #ddd;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .gallery {
                flex-direction: column;
                align-items: center;
            }

            .gallery img {
                margin-bottom: 15px;
                width: 90%;
            }

            .info {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

        Health Mart

            <img src="https://via.placeholder.com/400x280?text=Store+Front" alt="Health Mart Store Front" />
            <img src="https://via.placeholder.com/400x280?text=Store+Interior" alt="Health Mart Interior Shelves" />
