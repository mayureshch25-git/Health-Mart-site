<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Mart - Chemist & Lifestyle Store | Nilje, Thane</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            overflow-x: hidden;
        }

        /* HEADER */
        .header-top {
            background: linear-gradient(135deg, #1e7e34, #28a745);
            color: white;
            padding: 8px 0;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
        }

        .header-main {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: 800;
            color: #1e7e34;
            text-decoration: none;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 25px rgba(40,167,69,0.4);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-menu a {
            color: #495057;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover {
            color: #28a745;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .header-contact {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #28a745, #20c997);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(40,167,69,0.3);
            transition: all 0.3s ease;
        }

        .header-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40,167,69,0.4);
        }

        .header-contact i {
            font-size: 20px;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(30,126,52,0.85), rgba(40,167,69,0.7)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%231e7e34" width="1200" height="800"/><path fill="%2328a745" opacity="0.3" d="M0 400Q300 200 600 400T1200 400V800H0z"/></svg>');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="a" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ffffff" stop-opacity="0"/></radialGradient></defs><circle fill="url(%23a)" cx="20" cy="20" r="8"/><circle fill="url(%23a)" cx="80" cy="80" r="6"/><circle fill="url(%23a)" cx="40" cy="70" r="4"/></svg>') repeat;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideInUp 1s ease-out;
        }

        .hero-content p {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            margin-bottom: 40px;
            font-weight: 400;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: slideInUp 1s ease-out 0.2s both;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideInUp 1s ease-out 0.4s both;
        }

        .btn {
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .btn i {
            font-size: 22px;
        }

        /* RATINGS SECTION */
        .ratings-section {
            padding: 80px 0;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .rating-card {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .rating-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }

        .stars {
            color: #ffc107;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .rating-score {
            font-size: 3rem;
            font-weight: 800;
            color: #28a745;
            margin-bottom: 10px;
        }

        /* SERVICES SECTION */
        .services-section {
            padding: 100px 0;
            background: white;
        }

        .section-title {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-title h2 {
            font-size: 3rem;
            font-weight: 800;
            color: #1e7e34;
            margin-bottom: 20px;
            position: relative;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #28a745, #20c997);
            border-radius: 2px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .service-card {
            text-align: center;
            padding: 50px 30px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f8f9fa, white);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #28a745, #20c997);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-15px);
            border-color: #28a745;
            box-shadow: 0 30px 60px rgba(40,167,69,0.15);
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 15px 35px rgba(40,167,69,0.3);
        }

        /* IMMEDIATE ASSISTANCE */
        .immediate-section {
            padding: 100px 0;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .immediate-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle fill="%23ffffff" opacity="0.1" cx="20" cy="20" r="3"/><circle fill="%23ffffff" opacity="0.1" cx="80" cy="30" r="2"/><circle fill="%23ffffff" opacity="0.1" cx="40" cy="80" r="4"/></svg>') repeat;
        }

        .immediate-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .immediate-image {
            position: relative;
        }

        .immediate-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            border: 8px solid white;
        }

        .immediate-text h3 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .immediate-phone {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.95);
            color: #1e7e34;
            padding: 25px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .immediate-phone:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            color: #1e7e34;
        }

        .immediate-phone i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #28a745, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* BEST DEAL FORM */
        .form-section {
            padding: 120px 0;
            background: linear-gradient(135deg, #f8f9fa 0%, white 100%);
        }

        .deal-form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.1);
            border: 1px solid rgba(40,167,69,0.1);
        }

        .form-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .form-title h2 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1e7e34;
            margin-bottom: 15px;
        }

        .form-title p {
            font-size: 1.2rem;
            color: #6c757d;
            font-weight: 500;
        }

        /* FIXED CLICKABLE RADIO BUTTONS */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 25px 30px;
            background: #f8f9fa;
            border: 3px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1.1rem;
            color: #495057;
            text-align: center;
        }

        .radio-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }

        .radio-input:checked + .radio-label {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border-color: #28a745;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(40,167,69,0.3);
        }

        .radio-input:checked + .radio-label .radio-icon {
            background: white;
            color: #28a745;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #1e7e34;
            font-size: 1rem;
        }

        .form-control {
            width: 100%;
            padding: 20px 25px 20px 60px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        </style>
    .form-control {
    width: 100%;
    padding: 20px 25px 20px 60px;
    border: 2px solid #e9ecef;
    border-radius: 15px;
    font-size: 1.1rem;
    font-weight: 500;
transition: all 0.3s ease;
}
</style>
</head>
